<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MRANGA TOURS & SAFARIS LTD - RECEIPT</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo.png" alt="Mranga Tours & Safaris Ltd Logo" class="login-logo">
                <h1 class="login-title">MRANGA TOURS & SAFARIS</h1>
                <p class="login-subtitle">Internal RECEIPT Management System</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" id="toggle-password" class="toggle-btn" aria-label="Toggle password visibility">
                            <span class="icon-show">Show</span>
                            <span class="icon-hide hidden">Hide</span>
                        </button>
                    </div>
                </div>
                
                <div id="error-message" class="error-message hidden">
                    Invalid username or password. Please try again.
                </div>
                
                <button type="submit" class="login-submit-btn">Login to Dashboard</button>
            </form>
            
            <footer class="login-footer">
                &copy; 2026 MRANGA TOURS & SAFARIS LTD. All rights reserved.
            </footer>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
